{% extends "base.html" %}

{% block title %}DeCoder | Master Your Algorithms{% endblock %}

{% block content %}
    <header class="navbar">
        <div class="container navbar-container">
            <div class="nav-left">
                <a href="/user/home" class="logo">DeCoder</a>
                <nav>
                    <ul class="nav-links">
                        <li><a href="/problem/">Problems</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
               <h2>Welcome Back</h2>
            <form action="/auth/login_user" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary full-width">Sign In</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="/auth/register">Join now</a></p>
        </div>
    </main>      
{% endblock %}
