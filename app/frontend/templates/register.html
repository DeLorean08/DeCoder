{% extends "base.html" %}

{% block title %}DeCoder | Master Your Algorithms{% endblock %}

{% block content %}
    <header class="navbar">
        <div class="container navbar-container">
            <div class="nav-left">
                <a href="/user/home" class="logo">DeCoder</a>
                <nav>
                    <ul class="nav-links">
                        <li><a href="/problem/">Problems</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <form action="/auth/register_user" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">Username</label>
                    <input type="text" id="name" name="name" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn-primary full-width">Create Account</button>
            </form>
            <p class="auth-footer">Already a member? <a href="/auth/login">Log In</a></p>
        </div>
    </main>
{% endblock %}
